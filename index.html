<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Listesi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 2px solid #e0e0e0;
      background: #fff;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7f7ff;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #e74c3c;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 24px 0;
    }

    .summary {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." />
      <button onclick="addTodo()">+</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>
    <ul id="todoList"></ul>
    <p class="summary" id="summary"></p>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todoInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<p class="empty">Görev yok</p>';
      } else {
        list.innerHTML = visible.map(t => `
          <li class="${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})" />
            <span>${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="deleteTodo(${t.id})">✕</button>
          </li>
        `).join('');
      }

      const done = todos.filter(t => t.done).length;
      document.getElementById('summary').textContent =
        todos.length ? `${done} / ${todos.length} tamamlandı` : '';
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    render();
  </script>
</body>
</html>
