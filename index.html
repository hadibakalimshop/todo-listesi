<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Listesi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 460px;
    }

    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; text-align: center; }
    .subtitle { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 24px; }

    /* ---- AUTH ---- */
    #authBox { display: block; }
    #appBox  { display: none; }

    .tab-row { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
    .tab-row button {
      flex: 1; padding: 10px; background: none; border: none;
      font-size: 14px; color: #999; cursor: pointer; font-weight: 600;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-row button.active { color: #6c63ff; border-bottom-color: #6c63ff; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    .form-group input {
      width: 100%; padding: 10px 12px;
      border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #6c63ff; }

    .btn-primary {
      width: 100%; padding: 11px;
      background: #6c63ff; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; cursor: pointer;
      transition: background 0.2s; margin-top: 4px;
    }
    .btn-primary:hover { background: #574fd6; }
    .btn-primary:disabled { background: #c5c0ff; cursor: not-allowed; }

    .notice {
      margin-top: 14px; padding: 12px;
      border-radius: 8px; font-size: 13px; text-align: center;
    }
    .notice.success { background: #e8f5e9; color: #2e7d32; }
    .notice.error   { background: #fdecea; color: #c62828; }

    /* ---- APP ---- */
    .app-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }
    .app-header span { font-size: 13px; color: #888; }
    .btn-logout {
      font-size: 13px; color: #e74c3c; background: none;
      border: 1px solid #e74c3c; border-radius: 6px;
      padding: 4px 10px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: #e74c3c; color: #fff; }

    .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .input-row input {
      flex: 1; padding: 10px 14px;
      border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #6c63ff; }
    .input-row button {
      padding: 10px 18px; background: #6c63ff; color: #fff;
      border: none; border-radius: 8px; font-size: 22px;
      cursor: pointer; transition: background 0.2s;
    }
    .input-row button:hover { background: #574fd6; }

    .filters { display: flex; gap: 8px; margin-bottom: 14px; }
    .filters button {
      flex: 1; padding: 7px;
      border: 2px solid #e0e0e0; background: #fff;
      border-radius: 8px; font-size: 13px;
      cursor: pointer; transition: all 0.2s; color: #555;
    }
    .filters button.active { background: #6c63ff; border-color: #6c63ff; color: #fff; }

    ul { list-style: none; }
    li {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 10px; border-radius: 8px; transition: background 0.15s;
    }
    li:hover { background: #f7f7ff; }
    li input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: #6c63ff;
      cursor: pointer; flex-shrink: 0;
    }
    li span {
      flex: 1; font-size: 15px; color: #333; word-break: break-word;
    }
    li.done span { text-decoration: line-through; color: #aaa; }
    li .del {
      background: none; border: none; color: #ccc;
      font-size: 17px; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; transition: color 0.2s; flex-shrink: 0;
    }
    li .del:hover { color: #e74c3c; }

    .empty { text-align: center; color: #bbb; font-size: 14px; padding: 24px 0; }
    .summary { margin-top: 14px; font-size: 13px; color: #999; text-align: center; }
    .err { font-size: 13px; color: #e74c3c; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
<div class="card">

  <!-- AUTH -->
  <div id="authBox">
    <h1>Yapılacaklar</h1>
    <p class="subtitle">Devam etmek için giriş yap</p>

    <div class="tab-row">
      <button class="active" onclick="switchTab('login', this)">Giriş Yap</button>
      <button onclick="switchTab('register', this)">Kayıt Ol</button>
    </div>

    <!-- Login form -->
    <div id="loginForm">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="loginEmail" placeholder="ornek@mail.com" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="loginPass" placeholder="••••••" />
      </div>
      <button class="btn-primary" onclick="login()">Giriş Yap</button>
    </div>

    <!-- Register form -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="regEmail" placeholder="ornek@mail.com" />
      </div>
      <div class="form-group">
        <label>Şifre <span style="font-size:11px;color:#aaa">(en az 6 karakter)</span></label>
        <input type="password" id="regPass" placeholder="••••••" />
      </div>
      <button class="btn-primary" onclick="register()">Kayıt Ol</button>
    </div>

    <div id="authNotice" style="display:none" class="notice"></div>
  </div>

  <!-- APP -->
  <div id="appBox">
    <div class="app-header">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">Çıkış</button>
    </div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." />
      <button onclick="addTodo()">+</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all',this)">Tümü</button>
      <button onclick="setFilter('active',this)">Aktif</button>
      <button onclick="setFilter('done',this)">Tamamlanan</button>
    </div>

    <ul id="todoList"></ul>
    <p class="err" id="todoErr"></p>
    <p class="summary" id="summary"></p>
  </div>

</div>

<script>
  const BASE = 'https://ncgelqekgyhttfaivhpy.supabase.co';
  const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jZ2VscWVrZ3lodHRmYWl2aHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzQzMTEsImV4cCI6MjA5MjI1MDMxMX0.y-RewRdsqiTZOuRuWfi5kPZtwdaNBQw6fQssFzvxOWk';

  let session = null;
  let todos   = [];
  let filter  = 'all';

  /* ── helpers ── */
  function authHeaders(extra = {}) {
    return {
      'apikey': KEY,
      'Authorization': `Bearer ${session ? session.access_token : KEY}`,
      'Content-Type': 'application/json',
      ...extra
    };
  }

  async function supaFetch(url, opts = {}) {
    const res = await fetch(url, opts);
    if (res.status === 204) return null;
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.message || data.msg || res.statusText);
    return data;
  }

  /* ── auth tab ── */
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-row button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    hideNotice();
  }

  function showNotice(msg, type) {
    const el = document.getElementById('authNotice');
    el.textContent = msg;
    el.className = `notice ${type}`;
    el.style.display = '';
  }
  function hideNotice() {
    document.getElementById('authNotice').style.display = 'none';
  }

  /* ── register ── */
  async function register() {
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!email || !pass) return showNotice('E-posta ve şifre gerekli.', 'error');

    const btn = document.querySelector('#registerForm .btn-primary');
    btn.disabled = true;
    try {
      await supaFetch(`${BASE}/auth/v1/signup?redirect_to=https://hadibakalimshop.github.io/todo-listesi/`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ email, password: pass })
      });
      showNotice('Kayıt başarılı! Lütfen e-postanızı doğrulayın.', 'success');
      document.getElementById('regEmail').value = '';
      document.getElementById('regPass').value  = '';
    } catch(e) {
      showNotice(e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  /* ── login ── */
  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) return showNotice('E-posta ve şifre gerekli.', 'error');

    const btn = document.querySelector('#loginForm .btn-primary');
    btn.disabled = true;
    try {
      const data = await supaFetch(`${BASE}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ email, password: pass })
      });
      session = data;
      localStorage.setItem('sb_session', JSON.stringify(data));
      startApp(email);
    } catch(e) {
      showNotice(e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  /* ── logout ── */
  async function logout() {
    try {
      await supaFetch(`${BASE}/auth/v1/logout`, {
        method: 'POST',
        headers: authHeaders()
      });
    } catch(_) {}
    session = null;
    todos   = [];
    localStorage.removeItem('sb_session');
    document.getElementById('appBox').style.display  = 'none';
    document.getElementById('authBox').style.display = '';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value  = '';
    hideNotice();
  }

  /* ── app ── */
  function startApp(email) {
    document.getElementById('authBox').style.display = 'none';
    document.getElementById('appBox').style.display  = '';
    document.getElementById('userEmail').textContent = email;
    loadTodos();
  }

  async function loadTodos() {
    document.getElementById('todoList').innerHTML = '<li style="text-align:center;color:#bbb;padding:20px 0">Yükleniyor...</li>';
    try {
      todos = await supaFetch(`${BASE}/rest/v1/todos?order=created_at.asc`, {
        headers: authHeaders()
      });
      setTodoErr('');
      render();
    } catch(e) {
      setTodoErr('Yüklenemedi: ' + e.message);
      document.getElementById('todoList').innerHTML = '';
    }
  }

  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  async function addTodo() {
    const el   = document.getElementById('todoInput');
    const text = el.value.trim();
    if (!text) return;
    el.value = '';
    try {
      const res = await supaFetch(`${BASE}/rest/v1/todos`, {
        method: 'POST',
        headers: authHeaders({ 'Prefer': 'return=representation' }),
        body: JSON.stringify({ text, done: false, user_id: session.user.id })
      });
      todos.push(Array.isArray(res) ? res[0] : res);
      setTodoErr('');
      render();
    } catch(e) {
      setTodoErr('Eklenemedi: ' + e.message);
      el.value = text;
    }
  }

  async function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    try {
      await supaFetch(`${BASE}/rest/v1/todos?id=eq.${id}`, {
        method: 'PATCH',
        headers: authHeaders({ 'Prefer': '' }),
        body: JSON.stringify({ done: !todo.done })
      });
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      setTodoErr('');
      render();
    } catch(e) {
      setTodoErr('Güncellenemedi: ' + e.message);
    }
  }

  async function deleteTodo(id) {
    try {
      await supaFetch(`${BASE}/rest/v1/todos?id=eq.${id}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      todos = todos.filter(t => t.id !== id);
      setTodoErr('');
      render();
    } catch(e) {
      setTodoErr('Silinemedi: ' + e.message);
    }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function setTodoErr(msg) {
    document.getElementById('todoErr').textContent = msg;
  }

  function render() {
    const list    = document.getElementById('todoList');
    const visible = todos.filter(t =>
      filter === 'all' ? true : filter === 'done' ? t.done : !t.done
    );

    list.innerHTML = visible.length === 0
      ? '<li class="empty">Görev yok</li>'
      : visible.map(t => `
          <li class="${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
            <span>${esc(t.text)}</span>
            <button class="del" onclick="deleteTodo(${t.id})">&#x2715;</button>
          </li>`).join('');

    const done = todos.filter(t => t.done).length;
    document.getElementById('summary').textContent =
      todos.length ? `${done} / ${todos.length} tamamlandı` : '';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── restore session on load ── */
  (function init() {
    const raw = localStorage.getItem('sb_session');
    if (!raw) return;
    try {
      session = JSON.parse(raw);
      startApp(session.user.email);
    } catch(_) {
      localStorage.removeItem('sb_session');
    }
  })();
</script>
</body>
</html>
